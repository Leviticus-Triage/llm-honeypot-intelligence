name: Lint

on:
  push:
    branches: [main]
    paths: ["proxy/**/*.py"]
  pull_request:
    branches: [main]
    paths: ["proxy/**/*.py"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check proxy/src/ proxy/run_*.py
