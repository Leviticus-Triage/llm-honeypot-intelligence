name: Lint

on:
  push:
    branches: [main]
    paths: ["proxy/**/*.py", "pyproject.toml", ".github/workflows/lint.yml"]
  pull_request:
    branches: [main]
    paths: ["proxy/**/*.py", "pyproject.toml", ".github/workflows/lint.yml"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install "ruff>=0.15.0,<0.16"

      - name: Run ruff
        run: ruff check proxy/
